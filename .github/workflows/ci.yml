name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Julia ${{ matrix.julia-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10', '1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test with coverage
        run: julia --project=. --code-coverage=user -e 'using Pkg; Pkg.test(coverage=true)'
      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true

  benchmark-and-parity:
    name: Benchmark And Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python parity deps
        run: python3 -m pip install --upgrade pip numpy scipy astropy matplotlib
      - name: Python baseline
        run: python3 test/parity/generate_python_baseline.py
      - name: Parity compare
        run: julia --project=. test/parity/compare.jl
      - name: Python example metrics baseline
        run: python3 test/parity/generate_python_example_metrics.py
      - name: Example parity compare + thresholds
        run: julia --project=. test/parity/compare_examples.jl
      - name: Benchmarks
        run: ./scripts/benchmark_all.sh
      - name: Upload benchmark/parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-parity-artifacts
          path: |
            bench/reports/*.json
            test/parity/reports/*.json

  cuda-tests:
    name: CUDA Tests
    if: ${{ vars.ENABLE_CUDA_RUNNER == 'true' }}
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  amdgpu-tests:
    name: AMDGPU Tests
    if: ${{ vars.ENABLE_AMDGPU_RUNNER == 'true' }}
    runs-on: [self-hosted, linux, x64, amdgpu]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'
