name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Julia ${{ matrix.julia-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10', '1.12']
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Generate coverage
        run: ./scripts/coverage_lcov.sh
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

  python-parity:
    name: Python Parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYPROPER_ROOT: ${{ github.workspace }}/.ci-cache/proper_v3.3.4_python
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache Python PROPER baseline
        uses: actions/cache@v5
        with:
          path: .ci-cache/proper_v3.3.4_python
          key: proper-python-v3.3.4-sourceforge
      - name: Download Python PROPER baseline
        shell: bash
        run: |
          if [[ -d "${PYPROPER_ROOT}/proper" ]]; then
            echo "Using cached Python PROPER baseline at ${PYPROPER_ROOT}"
            exit 0
          fi
          ./scripts/setup_python_baseline.sh
      - name: Install Python parity deps
        run: python3 -m pip install --upgrade pip numpy scipy astropy matplotlib
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Python baseline
        run: python3 test/parity/generate_python_baseline.py
      - name: Parity compare
        run: julia --project=. test/parity/compare.jl
      - name: Python example metrics baseline
        run: python3 test/parity/generate_python_example_metrics.py
      - name: Example parity compare + thresholds
        run: julia --project=. test/parity/compare_examples.jl
      - name: Upload parity artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-parity-artifacts
          path: test/parity/reports/*.json

  cuda-tests:
    name: CUDA Tests
    if: ${{ vars.ENABLE_CUDA_RUNNER == 'true' }}
    runs-on: [self-hosted, linux, x64, cuda]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'

  amdgpu-tests:
    name: AMDGPU Tests
    if: ${{ vars.ENABLE_AMDGPU_RUNNER == 'true' }}
    runs-on: [self-hosted, linux, x64, amdgpu]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Test
        run: julia --project=. -e 'using Pkg; Pkg.test()'
